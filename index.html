<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>조은건설 | 기계설비·소방시설 전문 시공사</title>
    <meta name="description" content="조은건설은 기계설비공사와 소방시설공사를 전문으로 하는 종합 시공 파트너입니다." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Serif+KR:wght@600;700;900&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet" />
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('joeun-theme') || 'classic';
          var base = document.querySelector('base')?.getAttribute('href') || '/';
          var link = document.createElement('link');
          link.id = 'joeun-theme-css';
          link.rel = 'stylesheet';
          // 빌드 시 import.meta.env.BASE_URL 과 일치하도록 런타임에서도 보정.
          // 정적 자산은 public/themes/ 에 있으므로 base 와 결합한 경로를 사용합니다.
          link.href = (window.__JOEUN_BASE__ || '/') + 'themes/' + theme + '.css';
          document.head.appendChild(link);
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
